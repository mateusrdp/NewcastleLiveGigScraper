name: Build ICS Feed

on:
  workflow_call:
  schedule:
    # GitHub Actions cron always runs in UTC and doesn't shift for daylight
    # saving, so a single fixed UTC time would land an hour off local
    # midnight for half the year. Two entries approximate Monday 00:00
    # local time across both AEST and AEDT (the exact DST switchover date
    # moves by a week or two each year, so expect ~1hr drift for a week or
    # two right around the early-Apr/early-Oct changeover).
    - cron: "0 14 4-9 * 0"        # Apr-Sep (AEST, UTC+10) -> Monday 00:00 AEST
    - cron: "0 13 1-3,10-12 * 0"  # Oct-Mar (AEDT, UTC+11) -> Monday 00:00 AEDT
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
              pip install -r requirements.txt

      - name: Run pipeline
        run: |
          python src/main.py

      - name: Prepare Pages folder
        run: |
          mkdir -p public
          cp calendars/*.ics public/

      - name: Generate index page
        run: |
          python src/generate_index.py public "${{ github.repository }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
